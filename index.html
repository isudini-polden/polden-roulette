<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLDEN ROULETTE PRO (FIXED & ANIMATED)</title>
    <style>
        :root { 
            --primary-red: #ef4444; --hover-red: #f87171;
            --primary-blue: #3b82f6; --hover-blue: #60a5fa;
            --primary-green: #22c55e;
            --bg-dark: #0f172a; --card-bg: #1e293b; --text-main: #f1f5f9;
            --main-font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body { 
            font-family: var(--main-font); background: var(--bg-dark); color: var(--text-main); 
            display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0;
            overflow-x: hidden; text-transform: uppercase;
        }

        .header { text-align: center; margin-bottom: 15px; }
        .logo { width: 110px; height: auto; filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.4)); }

        .grid { 
            display: flex; flex-wrap: wrap; gap: 15px; max-width: 1200px; 
            justify-content: center; z-index: 1; padding-bottom: 50px;
        }

        /* КАРТОЧКА */
        .card { 
            background: var(--card-bg); border-radius: 14px; padding: 15px; 
            width: 195px; height: 420px; 
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 8px 20px -5px rgba(0, 0, 0, 0.4); 
            border: 1px solid #334155; text-align: center; position: relative;
            box-sizing: border-box; transition: transform 0.3s, border-color 0.3s;
        }
        .card:hover { transform: translateY(-3px); border-color: #475569; }

        /* ИМЯ В ОДНУ СТРОКУ */
        .player-name {
            font-weight: 900; font-size: 0.8rem; width: 100%;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            display: block; margin-bottom: 12px; flex-shrink: 0;
        }

        .card-dead::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/broken-glass.png');
            opacity: 0.5; pointer-events: none; border-radius: inherit; z-index: 5;
        }
        
        .card-win-glow { box-shadow: 0 0 30px rgba(34, 197, 94, 0.6) !important; border-color: var(--primary-green) !important; }

        /* АНИМАЦИИ */
        .revolver-svg { width: 80px; height: 80px; margin-bottom: 10px; flex-shrink: 0; z-index: 2; }
        @keyframes spin-animation { from { transform: rotate(0deg); } to { transform: rotate(1440deg); } }
        .spinning { animation: spin-animation 1.5s cubic-bezier(0.15, 0, 0.15, 1) forwards; }
        
        @keyframes screen-shake { 0%, 100% { transform: translate(0,0); } 20% { transform: translate(-8px, 4px); } 40% { transform: translate(8px, -4px); } 60% { transform: translate(-8px, -4px); } 80% { transform: translate(8px, 4px); } }
        .shake-active { animation: screen-shake 0.2s ease-in-out infinite; }

        /* КОНФЕТТИ */
        .popper { position: absolute; top: 50%; left: 50%; pointer-events: none; font-size: 1.6rem; z-index: 100; opacity: 0; }
        @keyframes cinematic-pop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) translate(var(--tx-end), 500px) rotate(720deg); opacity: 0; }
        }
        .animate-pop { animation: cinematic-pop 2.2s forwards; }

        .avatar-container { 
            width: 60px; height: 60px; border-radius: 50%; overflow: hidden; 
            border: 2px solid #475569; margin-bottom: 10px; flex-shrink: 0; background: #0f172a;
        }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }

        .info-text { font-size: 0.65rem; font-weight: 900; color: #94a3b8; margin: 2px 0; }
        .status-msg { font-size: 0.75rem; font-weight: 900; min-height: 1.5em; margin: 8px 0; }

        .controls { width: 100%; margin-top: auto; }
        .btn { 
            font-family: var(--main-font); border: none; border-radius: 8px; padding: 10px; 
            width: 100%; font-weight: 900; font-size: 0.7rem; cursor: pointer; 
            margin-top: 5px; color: white; text-transform: uppercase; transition: all 0.2s; 
        }
        .btn-shoot { background: var(--primary-red); box-shadow: 0 4px 0 #991b1b; }
        .btn-shoot:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 #991b1b; }
        .btn-reset { background: var(--primary-blue); box-shadow: 0 3px 0 #1e40af; opacity: 0.9; }

        .game-log {
            position: fixed; right: 20px; top: 20px; width: 220px; 
            background: rgba(15, 23, 42, 0.95); border: 1px solid #334155; 
            border-radius: 14px; padding: 12px; max-height: 80vh;
            overflow-y: auto; font-size: 0.6rem; z-index: 1000; backdrop-filter: blur(8px);
        }

        .admin-panel { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn-admin { background: #334155; width: auto; padding: 10px 20px; border-radius: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="images/PR_Logo.png" class="logo" onerror="this.style.display='none'">
    </div>

    <div id="adminPanel" class="admin-panel" style="display:none;">
        <button class="btn btn-admin" onclick="addPlayer()">+ Игрок</button>
        <button class="btn btn-admin" style="background: #1e3a8a;" onclick="restoreDefaultPlayers()">♻ Восстановить всех</button>
    </div>
    
    <div class="grid" id="mainGrid"></div>

    <div class="game-log">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px; color:#64748b; border-bottom:1px solid #334155;">
            <span>LOGS</span>
            <button onclick="clearLog()" style="background:none; border:none; color:var(--primary-red); cursor:pointer;">X</button>
        </div>
        <div id="gameLogEntries"></div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const S_URL = 'https://ezjxamiwgwuuslntfpcm.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6anhhbWl3Z3d1dXNsbnRmcGNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NzQ2ODgsImV4cCI6MjA5MzU1MDY4OH0.0vSWZaGVubIGVfAzcfcYbs-8g8YRPmO68BTal0HlXdU';
    const db = supabase.createClient(S_URL, S_KEY);

    let players = [];
    let localShootingId = null; 
    const isAdmin = new URLSearchParams(window.location.search).get('role') === 'admin';
    if(isAdmin) document.getElementById('adminPanel').style.display = 'flex';

    async function loadData() {
        const { data } = await db.from('players').select('*').order('id', { ascending: true });
        players = data || [];
        render();
    }

    async function loadLogs() {
        const { data } = await db.from('logs').select('*').order('id', { ascending: false }).limit(20);
        document.getElementById('gameLogEntries').innerHTML = (data || []).map(l => `
            <div style="color:${l.type==='fail'?'#ef4444':l.type==='win'?'#22c55e':'#94a3b8'}; margin-bottom:3px;">
                [${new Date(l.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}] ${l.text}
            </div>
        `).join('');
    }

    function createPoppers(cardEl) {
        const emojis = ['🎉', '✨', '🎊', '⭐️', '🔥', '💎'];
        for(let i=0; i<25; i++) {
            const span = document.createElement('span');
            span.className = 'popper animate-pop';
            span.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            span.style.setProperty('--tx-end', `${(Math.random() - 0.5) * 400}px`);
            cardEl.appendChild(span);
            setTimeout(() => span.remove(), 2300);
        }
    }

    async function shoot(id) {
        if (localShootingId) return;
        const p = players.find(x => x.id === id);
        if (!p || p.dead) return;

        localShootingId = id;
        const cardEl = document.querySelector(`[data-id="${id}"]`);
        const svgEl = cardEl.querySelector('.revolver-svg');
        
        svgEl.classList.remove('spinning');
        void svgEl.offsetWidth; 
        svgEl.classList.add('spinning');

        const left = 6 - p.pointer;
        const chance = (100 / left).toFixed(2);

        setTimeout(async () => {
            const hit = p.chambers[p.pointer] === 1;
            if (hit) {
                await db.from('players').update({ dead: true, lastResult: 'fail' }).eq('id', id);
                await db.from('logs').insert([{ text: `${p.name}: ШТРАФ (${chance}%)`, type: 'fail' }]);
                document.getElementById('mainGrid').classList.add('shake-active');
                setTimeout(() => document.getElementById('mainGrid').classList.remove('shake-active'), 400);
            } else {
                await db.from('players').update({ pointer: p.pointer + 1, lastResult: 'win' }).eq('id', id);
                await db.from('logs').insert([{ text: `${p.name}: ВЫЖИЛ (${chance}%)`, type: 'win' }]);
                createPoppers(cardEl);
            }
            localShootingId = null;
        }, 1500);
    }

    async function reset(id) {
        await db.from('players').update({ 
            chambers: [1,0,0,0,0,0].sort(()=>Math.random()-0.5), 
            pointer: 0, dead: false, lastResult: null 
        }).eq('id', id);
    }

    async function restoreDefaultPlayers() {
        if(!confirm("Восстановить список?")) return;
        await db.from('players').delete().neq('id', 0);
        const names = ["Витя", "Игорь (сценарист)", "Катя", "Вася (монтажер)", "Игорь (монтажер)", "Дима (монтажер)", "Артур", "Лиза", "Марина", "Вася (дизайнер)", "Саша"];
        await db.from('players').insert(names.map(n => ({
            name: n, chambers: [1,0,0,0,0,0].sort(()=>Math.random()-0.5),
            pointer: 0, dead: false, lastResult: null
        })));
    }

    async function addPlayer() {
        const name = prompt("Имя:");
        if(name) await db.from('players').insert([{ name, chambers: [1,0,0,0,0,0].sort(()=>Math.random()-0.5), pointer: 0, dead: false }]);
    }

    async function deletePlayer(id) {
        if(confirm("Удалить?")) await db.from('players').delete().eq('id', id);
    }

    async function clearLog() {
        if(confirm("Очистить?")) await db.from('logs').delete().neq('id', 0);
    }

    function render() {
        const grid = document.getElementById('mainGrid');
        
        players.forEach(p => {
            let card = document.querySelector(`[data-id="${p.id}"]`);
            if (!card) {
                card = document.createElement('div');
                card.setAttribute('data-id', p.id);
                grid.appendChild(card);
            }

            // Важно: не перерисовываем карточку, если МЫ СЕЙЧАС её крутим
            if (localShootingId !== p.id) {
                const left = 6 - p.pointer;
                const chance = p.dead ? "100.00" : (100 / left).toFixed(2);
                const isWin = p.lastResult === 'win' && !p.dead;
                const imgPath = `images/${encodeURIComponent(p.name)}.jpg`;

                card.className = `card ${p.dead ? 'card-dead' : ''} ${isWin ? 'card-win-glow' : ''}`;
                card.innerHTML = `
                    ${isAdmin ? `<button style="position:absolute; top:8px; right:8px; background:none; border:none; color:#475569; cursor:pointer; font-weight:bold; z-index:20;" onclick="deletePlayer(${p.id})">✕</button>` : ''}
                    <div class="player-name" title="${p.name}">${p.name}</div>
                    <svg class="revolver-svg" viewBox="0 0 200 200">
                        <circle cx="100" cy="100" r="90" fill="#475569" />
                        ${[0,60,120,180,240,300].map((deg, i) => {
                            const isBullet = p.chambers[i] === 1 && p.dead;
                            return `<circle cx="100" cy="40" r="22" fill="#0f172a" class="${isBullet ? 'bullet-red' : ''}" transform="rotate(${deg} 100 100)"/>`
                        }).join('')}
                    </svg>
                    <div class="avatar-container">
                        <img src="${imgPath}" onerror="this.src='https://via.placeholder.com/60/334155/94a3b8?text=?'" class="avatar-img">
                    </div>
                    <div class="info-text">ОСТАЛОСЬ: ${left}/6</div>
                    <div class="info-text">ШАНС: ${chance}%</div>
                    <div class="status-msg" style="color:${isWin?'#22c55e':(p.dead?'#ef4444':'transparent')}">
                        ${isWin ? 'ПОВЕЗЛО 🥳' : (p.dead ? 'ШТРАФ 💀' : '...')}
                    </div>
                    <div class="controls">
                        <button class="btn btn-shoot" onclick="shoot(${p.id})" ${p.dead ? 'disabled' : ''}>КРУТИТЬ</button>
                        ${isAdmin ? `<button class="btn btn-reset" onclick="reset(${p.id})">СБРОСИТЬ</button>` : ''}
                    </div>
                `;
            }
        });

        // Удаляем из DOM лишних
        document.querySelectorAll('.card').forEach(c => {
            const id = parseInt(c.getAttribute('data-id'));
            if (!players.find(p => p.id === id)) c.remove();
        });
    }

    // РЕАЛТАЙМ
    db.channel('public:players')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, (payload) => {
          console.log('Update detected:', payload);
          loadData();
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'logs' }, () => {
          loadLogs();
      })
      .subscribe((status) => {
          console.log('Realtime status:', status);
      });

    loadData();
    loadLogs();
</script>
</body>
</html>
