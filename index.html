<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLDEN ROULETTE PRO</title>
    <style>
        /* Оставляем твой CSS без изменений, он отличный */
        :root { 
            --primary-red: #ef4444; --hover-red: #f87171;
            --primary-blue: #3b82f6; --hover-blue: #60a5fa;
            --primary-green: #22c55e; --bg-dark: #0f172a; 
            --card-bg: #1e293b; --text-main: #f1f5f9;
            --main-font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body { font-family: var(--main-font); background: var(--bg-dark); color: var(--text-main); display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; text-transform: uppercase; }
        .header { text-align: center; margin-bottom: 15px; }
        .logo { width: 110px; filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.4)); }
        .container-wrapper { position: relative; width: 100%; display: flex; justify-content: center; }
        .grid { display: flex; flex-wrap: wrap; gap: 12px; max-width: 1160px; justify-content: center; }
        .game-log { position: absolute; right: 20px; top: 0; width: 220px; background: rgba(15, 23, 42, 0.9); border: 1px solid #334155; border-radius: 14px; padding: 12px; max-height: 80vh; overflow-y: auto; font-size: 0.65rem; z-index: 10; }
        .log-header { display: flex; justify-content: space-between; border-bottom: 1px solid #334155; padding-bottom: 5px; margin-bottom: 5px; }
        .card { background: var(--card-bg); border-radius: 14px; padding: 12px; width: 180px; border: 1px solid #334155; text-align: center; position: relative; }
        .card-dead { opacity: 0.7; }
        .card-dead::after { content: "💀"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; z-index: 5; }
        .btn { border: none; border-radius: 8px; padding: 10px; width: 100%; font-weight: 900; cursor: pointer; margin-bottom: 6px; color: white; text-transform: uppercase; }
        .btn-shoot { background: var(--primary-red); }
        .btn-reset { background: var(--primary-blue); }
        .add-btn { background: #334155; width: auto; padding: 12px 30px; margin-bottom: 20px; border-radius: 25px; }
        .revolver-svg { width: 80px; height: 80px; }
        .metal { fill: #475569; }
        .bullet-red { fill: var(--primary-red); }
        .avatar-container { width: 60px; height: 60px; margin: 10px auto; border-radius: 50%; border: 2px solid #475569; overflow: hidden; }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .btn-delete { position: absolute; top: 5px; right: 5px; background: none; border: none; color: #475569; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <img src="images/PR_Logo.png" alt="Logo" class="logo">
    </div>

    <button class="btn add-btn" id="addBtn" onclick="addPlayer()">+ Добавить Игрока</button>
    
    <div class="container-wrapper">
        <div class="grid" id="mainGrid"></div>
        <div class="game-log">
            <div class="log-header"><span>LOG CONSOLE</span></div>
            <div id="gameLogEntries"></div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://ezjxamiwgwuuslntfpcm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6anhhbWl3Z3d1dXNsbnRmcGNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NzQ2ODgsImV4cCI6MjA5MzU1MDY4OH0.0vSWZaGVubIGVfAzcfcYbs-8g8YRPmO68BTal0HlXdU';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let players = [];

    // Загрузка
    async function loadData() {
        const { data } = await supabase.from('players').select('*').order('id', { ascending: true });
        if (data) {
            players = data;
            render();
        }
    }

    // Realtime
    supabase.channel('public:players').on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, () => {
        loadData();
    }).subscribe();

    async function shoot(id) {
        const p = players.find(x => x.id === id);
        if (p.dead) return;
        const hit = p.chambers[p.pointer] === 1;
        let updates = hit ? { dead: true, lastResult: 'fail' } : { pointer: p.pointer + 1, lastResult: 'win' };
        await supabase.from('players').update(updates).eq('id', id);
    }

    async function reset(id) {
        const newChambers = [1, 0, 0, 0, 0, 0].sort(() => Math.random() - 0.5);
        await supabase.from('players').update({ chambers: newChambers, pointer: 0, dead: false, lastResult: null }).eq('id', id);
    }

    async function addPlayer() {
        const name = prompt("Имя:") || "НОВЫЙ";
        await supabase.from('players').insert([{
            name: name.toUpperCase(),
            chambers: [1, 0, 0, 0, 0, 0].sort(() => Math.random() - 0.5),
            pointer: 0,
            dead: false
        }]);
    }

    async function removePlayer(id) {
        if(confirm("Удалить?")) await supabase.from('players').delete().eq('id', id);
    }

    function render() {
        const grid = document.getElementById('mainGrid');
        const isAdmin = new URLSearchParams(window.location.search).get('role') === 'admin';
        grid.innerHTML = '';
        
        // Скрываем общую кнопку добавления
        document.getElementById('addBtn').style.display = isAdmin ? 'block' : 'none';

        players.forEach(p => {
            const card = document.createElement('div');
            card.className = `card ${p.dead ? 'card-dead' : ''}`;
            
            // Логика картинок: берем имя из базы и ищем в папке images
            // Важно: если в базе "ВИТЯ", файл должен быть "ВИТЯ.jpg" или измените на lowercase
            const imgPath = `images/${p.name}.jpg`;

            card.innerHTML = `
                ${isAdmin ? `<button class="btn-delete" onclick="removePlayer(${p.id})">✕</button>` : ''}
                <div style="font-weight:900; margin-bottom:10px;">${p.name}</div>
                <div class="avatar-container">
                    <img src="${imgPath}" onerror="this.src='https://via.placeholder.com/60/334155/94a3b8?text=?'" class="avatar-img">
                </div>
                <svg class="revolver-svg" viewBox="0 0 200 200">
                    <circle cx="100" cy="100" r="90" class="metal" />
                    ${[0,60,120,180,240,300].map((deg, i) => {
                        const isBullet = p.chambers[i] === 1 && p.dead;
                        return `<circle cx="100" cy="40" r="22" fill="#0f172a" class="${isBullet ? 'bullet-red' : ''}" transform="rotate(${deg} 100 100)"/>`
                    }).join('')}
                </svg>
                <div style="font-size:0.7rem; margin: 5px 0;">ПУЛЯ: ${p.dead ? 'В ГОЛОВЕ' : p.pointer + '/6'}</div>
                <button class="btn btn-shoot" onclick="shoot(${p.id})" ${p.dead ? 'disabled' : ''}>КРУТИТЬ</button>
                ${isAdmin ? `<button class="btn btn-reset" onclick="reset(${p.id})">СБРОСИТЬ</button>` : ''}
            `;
            grid.appendChild(card);
        });
    }

    loadData();
</script>
</body>
</html>
