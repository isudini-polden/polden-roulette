<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLDEN ROULETTE PRO</title>
    <style>
        :root { 
            --primary-red: #ef4444; --hover-red: #f87171;
            --primary-blue: #3b82f6; --hover-blue: #60a5fa;
            --primary-green: #22c55e;
            --bg-dark: #0f172a; --card-bg: #1e293b; --text-main: #f1f5f9;
            --main-font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body { 
            font-family: var(--main-font); background: var(--bg-dark); color: var(--text-main); 
            display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0;
            overflow-x: hidden; text-transform: uppercase;
        }

        .header { text-align: center; margin-bottom: 15px; }
        .logo { width: 110px; height: auto; filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.4)); }

        .container-wrapper { position: relative; width: 100%; display: flex; justify-content: center; }
        .grid { display: flex; flex-wrap: wrap; gap: 12px; max-width: 1160px; justify-content: center; z-index: 1; }

        /* LOG SYSTEM */
        .game-log {
            position: absolute; right: 20px; top: 0; width: 220px; background: rgba(15, 23, 42, 0.9);
            border: 1px solid #334155; border-radius: 14px; padding: 12px; max-height: 80vh;
            overflow-y: auto; font-size: 0.65rem; font-weight: 800; display: flex; flex-direction: column;
            gap: 6px; z-index: 10; backdrop-filter: blur(4px);
        }
        .log-entry { padding: 4px 8px; border-left: 2px solid var(--primary-blue); background: rgba(255,255,255,0.03); animation: slideIn 0.2s ease-out; }
        .log-win { border-color: var(--primary-green); color: var(--primary-green); }
        .log-fail { border-color: var(--primary-red); color: var(--primary-red); }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

        /* CARD DESIGN */
        .card { 
            background: var(--card-bg); border-radius: 14px; padding: 12px; width: 180px; 
            border: 1px solid #334155; text-align: center; position: relative;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); box-sizing: border-box;
        }
        .card-dead::after {
            content: "💀"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3rem; opacity: 0.2; z-index: 5;
        }
        .card-win-glow { box-shadow: 0 0 30px rgba(34, 197, 94, 0.6) !important; border-color: var(--primary-green) !important; }

        /* ANIMATIONS */
        @keyframes spin-animation { from { transform: rotate(0deg); } to { transform: rotate(1440deg); } }
        .spinning { animation: spin-animation 1.2s cubic-bezier(0.15, 0, 0.15, 1) forwards; }
        @keyframes screen-shake { 0%, 100% { transform: translate(0,0); } 20% { transform: translate(-8px, 4px); } 40% { transform: translate(8px, -4px); } 60% { transform: translate(-8px, -4px); } 80% { transform: translate(8px, 4px); } }
        .shake-active { animation: screen-shake 0.2s ease-in-out infinite; }

        /* POPPERS */
        .popper { position: absolute; top: 50%; left: 50%; pointer-events: none; font-size: 1.6rem; z-index: 100; opacity: 0; }
        @keyframes cinematic-pop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) translate(var(--tx-end), 500px) rotate(720deg); opacity: 0; }
        }
        .animate-pop { animation: cinematic-pop 2.2s forwards; }

        /* BUTTONS */
        .btn { border: none; border-radius: 8px; padding: 10px; width: 100%; font-weight: 900; cursor: pointer; margin-bottom: 6px; color: white; text-transform: uppercase; transition: all 0.2s; }
        .btn-shoot { background: var(--primary-red); box-shadow: 0 4px 0 #991b1b; }
        .btn-shoot:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 #991b1b; }
        .btn-reset { background: var(--primary-blue); font-size: 0.7rem; }
        .add-btn { background: #334155; width: auto; padding: 12px 30px; margin-bottom: 20px; border-radius: 25px; border: 1px solid #475569; }
        .btn-delete { position: absolute; top: 5px; right: 5px; background: none; border: none; color: #475569; cursor: pointer; font-weight: bold; }

        .revolver-svg { width: 90px; height: 90px; margin-bottom: 8px; }
        .bullet-red { fill: var(--primary-red) !important; filter: drop-shadow(0 0 8px var(--primary-red)); }
        .avatar-container { width: 55px; height: 55px; margin: 8px auto; border-radius: 50%; overflow: hidden; border: 2px solid #475569; }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .info-text { font-size: 0.65rem; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="header">
        <img src="images/PR_Logo.png" class="logo" onerror="this.style.display='none'">
    </div>

    <button class="btn add-btn" id="addBtn" onclick="addPlayer()" style="display:none;">+ Добавить Игрока</button>
    
    <div class="container-wrapper">
        <div class="grid" id="mainGrid"></div>
        <div class="game-log">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; color:#64748b; font-size:0.6rem;">
                <span>LOG CONSOLE</span>
                <button onclick="clearLog()" style="background:none; border:none; color:var(--primary-red); cursor:pointer; font-size:0.6rem;">ОЧИСТИТЬ</button>
            </div>
            <div id="gameLogEntries"></div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const S_URL = 'https://ezjxamiwgwuuslntfpcm.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6anhhbWl3Z3d1dXNsbnRmcGNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NzQ2ODgsImV4cCI6MjA5MzU1MDY4OH0.0vSWZaGVubIGVfAzcfcYbs-8g8YRPmO68BTal0HlXdU';
    const db = supabase.createClient(S_URL, S_KEY);

    let players = [];
    const isAdmin = new URLSearchParams(window.location.search).get('role') === 'admin';

    async function loadData() {
        const { data } = await db.from('players').select('*').order('id', { ascending: true });
        players = data || [];
        render();
        loadLogs();
    }

    async function loadLogs() {
        const { data } = await db.from('logs').select('*').order('id', { ascending: false }).limit(20);
        const container = document.getElementById('gameLogEntries');
        container.innerHTML = (data || []).map(l => `
            <div class="log-entry ${l.type === 'win' ? 'log-win' : (l.type === 'fail' ? 'log-fail' : '')}">
                [${new Date(l.created_at).toLocaleTimeString()}] ${l.text}
            </div>
        `).join('');
    }

    async function addLog(text, type) {
        await db.from('logs').insert([{ text, type }]);
    }

    async function clearLog() {
        if(confirm("Очистить историю?")) await db.from('logs').delete().neq('id', 0);
    }

    function createPoppers(cardEl) {
        const emojis = ['🎉', '✨', '🎊', '⭐️'];
        for(let i=0; i<15; i++) {
            const span = document.createElement('span');
            span.className = 'popper animate-pop';
            span.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            span.style.setProperty('--tx-end', `${(Math.random() - 0.5) * 400}px`);
            cardEl.appendChild(span);
            setTimeout(() => span.remove(), 2200);
        }
    }

    async function shoot(id) {
        const p = players.find(x => x.id === id);
        if (!p || p.dead) return;

        const cardEl = document.querySelector(`[data-id="${id}"]`);
        const svgEl = cardEl.querySelector('.revolver-svg');
        svgEl.classList.add('spinning');

        setTimeout(async () => {
            const hit = p.chambers[p.pointer] === 1;
            const chance = (100 / (6 - p.pointer)).toFixed(0);
            
            if (hit) {
                await db.from('players').update({ dead: true, lastResult: 'fail' }).eq('id', id);
                await addLog(`${p.name}: ШТРАФ (${chance}%)`, 'fail');
                document.getElementById('mainGrid').classList.add('shake-active');
                setTimeout(() => document.getElementById('mainGrid').classList.remove('shake-active'), 400);
            } else {
                await db.from('players').update({ pointer: p.pointer + 1, lastResult: 'win' }).eq('id', id);
                await addLog(`${p.name}: ВЫЖИЛ (${chance}%)`, 'win');
                createPoppers(cardEl);
            }
        }, 1200);
    }

    async function reset(id) {
        const newChambers = [1, 0, 0, 0, 0, 0].sort(() => Math.random() - 0.5);
        const p = players.find(x => x.id === id);
        await db.from('players').update({ chambers: newChambers, pointer: 0, dead: false, lastResult: null }).eq('id', id);
        await addLog(`${p.name}: ПЕРЕЗАРЯДКА`, 'info');
    }

    async function addPlayer() {
        const name = prompt("Имя игрока:") || "НОВЫЙ";
        const ch = [1, 0, 0, 0, 0, 0].sort(() => Math.random() - 0.5);
        await db.from('players').insert([{ name: name.toUpperCase(), chambers: ch, pointer: 0, dead: false }]);
    }

    async function deletePlayer(id) {
        if(confirm("Удалить?")) await db.from('players').delete().eq('id', id);
    }

    function render() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';
        document.getElementById('addBtn').style.display = isAdmin ? 'block' : 'none';

        players.forEach(p => {
            const card = document.createElement('div');
            card.className = `card ${p.dead ? 'card-dead' : ''} ${p.lastResult === 'win' && !p.dead ? 'card-win-glow' : ''}`;
            card.setAttribute('data-id', p.id);
            
            card.innerHTML = `
                ${isAdmin ? `<button class="btn-delete" onclick="deletePlayer(${p.id})">✕</button>` : ''}
                <div style="font-weight:900; margin-bottom:5px;">${p.name}</div>
                <svg class="revolver-svg" viewBox="0 0 200 200">
                    <circle cx="100" cy="100" r="90" fill="#475569" />
                    ${[0,60,120,180,240,300].map((deg, i) => {
                        const isBullet = p.chambers[i] === 1 && p.dead;
                        return `<circle cx="100" cy="40" r="22" fill="#0f172a" class="${isBullet ? 'bullet-red' : ''}" transform="rotate(${deg} 100 100)"/>`
                    }).join('')}
                </svg>
                <div class="avatar-container">
                    <img src="images/${p.name}.jpg" onerror="this.src='https://via.placeholder.com/60/334155/94a3b8?text=?'" class="avatar-img">
                </div>
                <div class="info-text">ПУЛЯ: ${p.pointer}/6</div>
                <div class="status-msg ${p.dead ? 'fail' : 'success'}">${p.lastResult === 'win' ? 'ВЫЖИЛ' : (p.dead ? 'ШТРАФ' : '')}</div>
                <button class="btn btn-shoot" onclick="shoot(${p.id})" ${p.dead ? 'disabled' : ''}>КРУТИТЬ</button>
                ${isAdmin ? `<button class="btn btn-reset" onclick="reset(${p.id})">СБРОСИТЬ</button>` : ''}
            `;
            grid.appendChild(card);
        });
    }

    db.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: '*' }, () => loadData()).subscribe();
    loadData();
</script>
</body>
</html>
