<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLDEN ROULETTE PRO (ELITE EDITION)</title>
    <style>
        :root { 
            --primary-red: #ef4444; --hover-red: #f87171;
            --primary-blue: #3b82f6; --hover-blue: #60a5fa;
            --primary-green: #22c55e;
            --bg-dark: #0f172a; --card-bg: #1e293b; --text-main: #f1f5f9;
            --main-font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body { 
            font-family: var(--main-font); background: var(--bg-dark); color: var(--text-main); 
            display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0;
            overflow-x: hidden; text-transform: uppercase;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .logo { width: 120px; height: auto; filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.4)); }

        /* СЕТКА */
        .grid { 
            display: flex; flex-wrap: wrap; gap: 12px; 
            max-width: 1320px; 
            justify-content: center; z-index: 1; padding-bottom: 50px;
        }

        /* КАРТОЧКА */
        .card { 
            background: var(--card-bg); border-radius: 16px; padding: 15px; 
            width: 210px; height: 420px; 
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5); 
            border: 1px solid #334155; text-align: center; position: relative;
            box-sizing: border-box; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:hover { transform: translateY(-8px) scale(1.02); border-color: #64748b; }

        .player-name {
            font-weight: 900; font-size: 0.85rem; width: 100%;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            display: block; margin-bottom: 12px; flex-shrink: 0;
            color: #fff; letter-spacing: 0.5px;
        }

        /* ЭФФЕКТЫ СМЕРТИ И ПОБЕД */
        .card-dead::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/broken-glass.png');
            opacity: 0.6; pointer-events: none; border-radius: inherit; z-index: 5;
        }
        
        /* КРАСНОЕ СВЕЧЕНИЕ ПРИ ШТРАФЕ */
        .card-fail-glow { 
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.8) !important; 
            border-color: var(--primary-red) !important;
            animation: pulse-red 1.5s infinite;
        }

        /* ЗЕЛЕНОЕ СВЕЧЕНИЕ ПРИ ВЫЖИВАНИИ */
        .card-win-glow { 
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.7) !important; 
            border-color: var(--primary-green) !important;
            animation: pulse-green 1.5s infinite;
        }

        @keyframes pulse-red { 0%, 100% { box-shadow: 0 0 40px rgba(239, 68, 68, 0.8); } 50% { box-shadow: 0 0 60px rgba(239, 68, 68, 1); } }
        @keyframes pulse-green { 0%, 100% { box-shadow: 0 0 40px rgba(34, 197, 94, 0.7); } 50% { box-shadow: 0 0 60px rgba(34, 197, 94, 0.9); } }

        /* АНИМАЦИИ */
        .revolver-svg { width: 85px; height: 85px; margin-bottom: 10px; flex-shrink: 0; z-index: 2; transition: transform 0.3s; }
        @keyframes spin-animation { from { transform: rotate(0deg); } to { transform: rotate(1440deg); } }
        .spinning { animation: spin-animation 1.5s cubic-bezier(0.15, 0, 0.15, 1) forwards; }
        
        .avatar-container { width: 60px; height: 60px; border-radius: 50%; overflow: hidden; border: 2px solid #475569; margin-bottom: 10px; background: #0f172a; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .bullet-red { fill: var(--primary-red) !important; filter: drop-shadow(0 0 10px var(--primary-red)); }

        /* КНОПКИ С ПОДСВЕТКОЙ */
        .controls { width: 100%; margin-top: auto; }
        .btn { 
            font-family: var(--main-font); border: none; border-radius: 8px; padding: 12px; 
            width: 100%; font-weight: 900; font-size: 0.7rem; cursor: pointer; color: white; 
            text-transform: uppercase; margin-top: 6px; transition: all 0.3s ease;
            position: relative; overflow: hidden;
        }
        .btn::before {
            content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }
        .btn:hover::before { left: 100%; }

        .btn-shoot { 
            background: var(--primary-red); 
            box-shadow: 0 4px 0 #991b1b;
        }
        .btn-shoot:hover:not(:disabled) { 
            background: var(--hover-red); 
            transform: translateY(-2px); 
            box-shadow: 0 6px 15px rgba(239, 68, 68, 0.4), 0 4px 0 #991b1b;
        }
        
        .btn-reset { 
            background: var(--primary-blue); 
            box-shadow: 0 3px 0 #1e40af; 
            opacity: 0.9;
        }
        .btn-reset:hover { 
            background: var(--hover-blue); 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(59, 130, 246, 0.3), 0 3px 0 #1e40af;
        }

        .btn:active:not(:disabled) { transform: translateY(2px) !important; box-shadow: 0 0 0 transparent !important; }

        /* ЛОГИ */
        .game-log { 
            position: fixed; right: 20px; top: 20px; width: 240px; 
            background: rgba(15, 23, 42, 0.9); border: 1px solid #334155; 
            border-radius: 16px; padding: 15px; max-height: 80vh;
            overflow-y: auto; font-size: 0.6rem; z-index: 1000; 
            backdrop-filter: blur(12px); box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="images/PR_Logo.png" class="logo" onerror="this.style.display='none'">
    </div>

    <div id="adminPanel" style="display:none; margin-bottom: 20px; gap: 10px;">
        <button onclick="addPlayer()" style="background:#334155; color:white; border:none; padding:10px 20px; border-radius:20px; cursor:pointer; font-weight:900;">+ ИГРОК</button>
        <button onclick="restoreDefaultPlayers()" style="background:#1e3a8a; color:white; border:none; padding:10px 20px; border-radius:20px; cursor:pointer; font-weight:900;">♻ ВОССТАНОВИТЬ ВСЕХ</button>
    </div>
    
    <div class="grid" id="mainGrid"></div>

    <div class="game-log">
        <div style="display:flex; justify-content:space-between; margin-bottom:12px; color:#64748b; border-bottom:1px solid #334155; padding-bottom:6px;">
            <span style="font-size:0.6rem; font-weight: 900; letter-spacing: 1px;">CONSOLE</span>
            <button id="clrBtn" onclick="clearLog()" style="display:none; background:none; border:none; color:var(--primary-red); cursor:pointer; font-weight:900; font-size:0.55rem;">ОЧИСТИТЬ</button>
        </div>
        <div id="gameLogEntries"></div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const S_URL = 'https://ezjxamiwgwuuslntfpcm.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6anhhbWl3Z3d1dXNsbnRmcGNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NzQ2ODgsImV4cCI6MjA5MzU1MDY4OH0.0vSWZaGVubIGVfAzcfcYbs-8g8YRPmO68BTal0HlXdU';
    const db = supabase.createClient(S_URL, S_KEY);

    let players = [];
    let myShootingId = null; 
    const isAdmin = new URLSearchParams(window.location.search).get('role') === 'admin';
    
    if(isAdmin) {
        document.getElementById('adminPanel').style.display = 'flex';
        document.getElementById('clrBtn').style.display = 'block';
    }

    async function loadData() {
        const { data } = await db.from('players').select('*').order('id', { ascending: true });
        players = data || [];
        render();
    }

    async function loadLogs() {
        const { data } = await db.from('logs').select('*').order('id', { ascending: false }).limit(30);
        document.getElementById('gameLogEntries').innerHTML = (data || []).map(l => `
            <div style="margin-bottom:6px; border-left: 2px solid ${l.type==='fail'?'#ef4444':l.type==='win'?'#22c55e':'#3b82f6'}; padding: 4px 8px; background:rgba(255,255,255,0.03); border-radius: 0 4px 4px 0;">
                <div style="color:#64748b; font-size:0.5rem; margin-bottom: 2px;">${new Date(l.created_at).toLocaleTimeString()}</div>
                <div style="color:${l.type==='fail'?'#ef4444':l.type==='win'?'#22c55e':'#f1f5f9'}; font-weight: 800;">${l.text}</div>
            </div>
        `).join('');
    }

    function createPoppers(cardEl) {
        const emojis = ['🎉', '✨', '🎊', '⭐️', '🔥', '💎', '🟢', '👑'];
        for(let i=0; i<30; i++) {
            const span = document.createElement('span');
            span.className = 'popper animate-pop';
            span.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            span.style.setProperty('--tx-end', `${(Math.random() - 0.5) * 500}px`);
            cardEl.appendChild(span);
            setTimeout(() => span.remove(), 2300);
        }
    }

    async function shoot(id) {
        if (myShootingId) return;
        const p = players.find(x => x.id === id);
        if (!p || p.dead) return;

        myShootingId = id;
        const cardEl = document.querySelector(`[data-id="${id}"]`);
        const svgEl = cardEl.querySelector('.revolver-svg');
        
        svgEl.classList.add('spinning');

        const chance = (100 / (6 - p.pointer)).toFixed(2);

        setTimeout(async () => {
            const hit = p.chambers[p.pointer] === 1;
            if (hit) {
                await db.from('players').update({ dead: true, lastResult: 'fail' }).eq('id', id);
                await db.from('logs').insert([{ text: `${p.name}: ШТРАФ (${chance}%)`, type: 'fail' }]);
                document.getElementById('mainGrid').classList.add('shake-active');
                setTimeout(() => document.getElementById('mainGrid').classList.remove('shake-active'), 400);
            } else {
                await db.from('players').update({ pointer: p.pointer + 1, lastResult: 'win' }).eq('id', id);
                await db.from('logs').insert([{ text: `${p.name}: ВЫЖИЛ (${chance}%)`, type: 'win' }]);
                createPoppers(cardEl);
            }
            myShootingId = null;
        }, 1500);
    }

    async function restoreDefaultPlayers() {
        if(!confirm("Удалить текущих и восстановить список?")) return;
        await db.from('players').delete().neq('id', 0);
        const names = ["Витя", "Игорь (сценарист)", "Катя", "Вася (монтажер)", "Игорь (монтажер)", "Дима (монтажер)", "Артур", "Лиза", "Марина", "Вася (дизайнер)", "Саша"];
        await db.from('players').insert(names.map(n => ({
            name: n, chambers: [1,0,0,0,0,0].sort(()=>Math.random()-0.5), pointer: 0, dead: false, lastResult: null
        })));
        loadData();
    }

    async function reset(id) {
        await db.from('players').update({ chambers: [1,0,0,0,0,0].sort(()=>Math.random()-0.5), pointer: 0, dead: false, lastResult: null }).eq('id', id);
    }

    async function addPlayer() {
        const name = prompt("Имя игрока:");
        if(name) await db.from('players').insert([{ name, chambers:[1,0,0,0,0,0].sort(()=>Math.random()-0.5), pointer:0, dead:false}]);
    }

    async function deletePlayer(id) {
        if(confirm("Удалить?")) await db.from('players').delete().eq('id', id);
    }

    async function clearLog() {
        if(!confirm("Очистить историю логов?")) return;
        await db.from('logs').delete().neq('id', 0);
        loadLogs();
    }

    function render() {
        const grid = document.getElementById('mainGrid');
        players.forEach(p => {
            let card = document.querySelector(`[data-id="${p.id}"]`);
            if (!card) {
                card = document.createElement('div');
                card.setAttribute('data-id', p.id);
                grid.appendChild(card);
            }
            
            if (myShootingId !== p.id) {
                const isWin = p.lastResult === 'win' && !p.dead;
                const isFail = p.dead;

                // Добавляем классы свечения
                card.className = `card ${isFail ? 'card-dead card-fail-glow' : ''} ${isWin ? 'card-win-glow' : ''}`;
                
                card.innerHTML = `
                    ${isAdmin ? `<button style="position:absolute; top:8px; right:8px; background:none; border:none; color:#475569; cursor:pointer; font-weight:bold; z-index:20;" onclick="deletePlayer(${p.id})">✕</button>` : ''}
                    <div class="player-name" title="${p.name}">${p.name}</div>
                    <svg class="revolver-svg" viewBox="0 0 200 200">
                        <circle cx="100" cy="100" r="90" fill="#475569" stroke="#1e293b" stroke-width="2" />
                        ${[0,60,120,180,240,300].map((deg, i) => {
                            const isBullet = p.chambers[i] === 1 && p.dead;
                            return `<circle cx="100" cy="40" r="22" fill="#0f172a" class="${isBullet ? 'bullet-red' : ''}" transform="rotate(${deg} 100 100)"/>`
                        }).join('')}
                    </svg>
                    <div class="avatar-container">
                        <img src="images/${encodeURIComponent(p.name)}.jpg" onerror="this.src='https://via.placeholder.com/60/334155/94a3b8?text=?'" class="avatar-img">
                    </div>
                    <div class="info-text" style="color: ${isFail?'#ef4444':'#94a3b8'}">ПУЛЯ: ${p.pointer}/6</div>
                    <div class="status-msg" style="color:${isWin?'#22c55e':(isFail?'#ef4444':'transparent')}; text-shadow: 0 0 10px ${isWin?'rgba(34,197,94,0.5)':'rgba(239,68,68,0.5)'}">
                        ${isWin ? 'ВЫЖИЛ 🥳' : (isFail ? 'ШТРАФ 💀' : '...')}
                    </div>
                    <div class="controls">
                        <button class="btn btn-shoot" onclick="shoot(${p.id})" ${p.dead ? 'disabled' : ''}>КРУТИТЬ</button>
                        ${isAdmin ? `<button class="btn btn-reset" onclick="reset(${p.id})">СБРОСИТЬ</button>` : ''}
                    </div>
                `;
            }
        });
        document.querySelectorAll('.card').forEach(c => {
            if (!players.find(p => p.id == c.getAttribute('data-id'))) c.remove();
        });
    }

    db.channel('public:players')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, () => loadData())
      .on('postgres_changes', { event: '*', schema: 'public', table: 'logs' }, () => loadLogs())
      .subscribe();

    loadData(); loadLogs();
</script>
</body>
</html>
