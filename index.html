<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLDEN ROULETTE PRO (ELITE)</title>
    <style>
        :root { 
            --primary-red: #ef4444; --hover-red: #f87171;
            --primary-blue: #3b82f6; --hover-blue: #60a5fa;
            --primary-green: #22c55e;
            --bg-dark: #0f172a; --card-bg: #1e293b; --text-main: #f1f5f9;
            --main-font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body { 
            font-family: var(--main-font); background: var(--bg-dark); color: var(--text-main); 
            display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0;
            overflow-x: hidden; text-transform: uppercase;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .logo { width: 120px; height: auto; filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.4)); }

        /* СЕТКА: Ровно 6 в ряд на больших экранах */
        .grid { 
            display: flex; flex-wrap: wrap; gap: 12px; 
            max-width: 1340px; 
            justify-content: center; z-index: 1; padding-bottom: 50px;
        }

        /* КАРТОЧКА */
        .card { 
            background: var(--card-bg); border-radius: 16px; padding: 15px; 
            width: 210px; height: 430px; 
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5); 
            border: 1px solid #334155; text-align: center; position: relative;
            box-sizing: border-box; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:hover { transform: translateY(-8px); border-color: #64748b; }

        .player-name {
            font-weight: 900; font-size: 0.85rem; width: 100%;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            display: block; margin-bottom: 12px; flex-shrink: 0;
            color: #fff; letter-spacing: 0.5px;
        }

        /* ЭФФЕКТЫ СМЕРТИ И ПОБЕД */
        .card-dead::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/broken-glass.png');
            opacity: 0.6; pointer-events: none; border-radius: inherit; z-index: 5;
        }
        
        .card-fail-glow { 
            box-shadow: 0 0 45px rgba(239, 68, 68, 0.8) !important; 
            border-color: var(--primary-red) !important;
            animation: pulse-red 1.5s infinite;
        }

        .card-win-glow { 
            box-shadow: 0 0 45px rgba(34, 197, 94, 0.7) !important; 
            border-color: var(--primary-green) !important;
            animation: pulse-green 1.5s infinite;
        }

        @keyframes pulse-red { 0%, 100% { box-shadow: 0 0 40px rgba(239, 68, 68, 0.6); } 50% { box-shadow: 0 0 60px rgba(239, 68, 68, 1); } }
        @keyframes pulse-green { 0%, 100% { box-shadow: 0 0 40px rgba(34, 197, 94, 0.5); } 50% { box-shadow: 0 0 60px rgba(34, 197, 94, 0.9); } }

        .revolver-svg { width: 85px; height: 85px; margin-bottom: 10px; flex-shrink: 0; z-index: 2; transition: transform 0.3s; }
        @keyframes spin-animation { from { transform: rotate(0deg); } to { transform: rotate(1440deg); } }
        .spinning { animation: spin-animation 1.5s cubic-bezier(0.15, 0, 0.15, 1) forwards; }
        
        @keyframes screen-shake { 0%, 100% { transform: translate(0,0); } 20% { transform: translate(-8px, 4px); } 40% { transform: translate(8px, -4px); } 60% { transform: translate(-8px, -4px); } 80% { transform: translate(8px, 4px); } }
        .shake-active { animation: screen-shake 0.2s ease-in-out infinite; }

        .avatar-container { width: 62px; height: 62px; border-radius: 50%; overflow: hidden; border: 2px solid #475569; margin-bottom: 10px; background: #0f172a; flex-shrink: 0; }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .bullet-red { fill: var(--primary-red) !important; filter: drop-shadow(0 0 10px var(--primary-red)); }

        /* КНОПКИ */
        .controls { width: 100%; margin-top: auto; }
        .btn { 
            font-family: var(--main-font); border: none; border-radius: 8px; padding: 12px; 
            width: 100%; font-weight: 900; font-size: 0.75rem; cursor: pointer; color: white; 
            text-transform: uppercase; margin-top: 6px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        
        /* Эффект блика */
        .btn::after {
            content: ""; position: absolute; top: -50%; left: -60%; width: 20%; height: 200%;
            background: rgba(255, 255, 255, 0.2); transform: rotate(30deg); transition: 0s;
        }
        .btn:hover::after { left: 140%; transition: 0.6s; }

        .btn-shoot { 
            background: var(--primary-red); 
            box-shadow: 0 4px 0 #991b1b;
        }
        .btn-shoot:hover:not(:disabled) { 
            background: var(--hover-red); 
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4), 0 4px 0 #991b1b;
        }
        
        .btn-reset { 
            background: var(--primary-blue); 
            box-shadow: 0 3px 0 #1e40af; 
            opacity: 0.9;
        }
        .btn-reset:hover { 
            background: var(--hover-blue); 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3), 0 3px 0 #1e40af;
        }

        .btn:active:not(:disabled) { transform: translateY(2px) !important; box-shadow: 0 0 0 transparent !important; }

        /* ЛОГИ */
        .game-log { 
            position: fixed; right: 20px; top: 20px; width: 250px; 
            background: rgba(15, 23, 42, 0.92); border: 1px solid #334155; 
            border-radius: 16px; padding: 15px; max-height: 85vh;
            overflow-y: auto; font-size: 0.6rem; z-index: 1000; 
            backdrop-filter: blur(12px); box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .popper { position: absolute; top: 50%; left: 50%; pointer-events: none; font-size: 1.6rem; z-index: 100; opacity: 0; }
        @keyframes cinematic-pop { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 15% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); } 100% { transform: translate(-50%, -50%) translate(var(--tx-end), 500px) rotate(720deg); opacity: 0; } }
        .animate-pop { animation: cinematic-pop 2.2s forwards; }
    </style>
</head>
<body>

    <div class="header">
        <img src="images/PR_Logo.png" class="logo" onerror="this.style.display='none'">
    </div>

    <div id="adminPanel" style="display:none; margin-bottom: 25px; gap: 12px;">
        <button onclick="addPlayer()" style="background:#334155; color:white; border:none; padding:12px 24px; border-radius:25px; cursor:pointer; font-weight:900; transition: 0.3s;" onmouseover="this.style.background='#475569'" onmouseout="this.style.background='#334155'">+ ДОБАВИТЬ ИГРОКА</button>
        <button onclick="restoreDefaultPlayers()" style="background:#1e3a8a; color:white; border:none; padding:12px 24px; border-radius:25px; cursor:pointer; font-weight:900; transition: 0.3s;" onmouseover="this.style.background='#1e40af'" onmouseout="this.style.background='#1e3a8a'">♻ ВОССТАНОВИТЬ СПИСОК</button>
    </div>
    
    <div class="grid" id="mainGrid"></div>

    <div class="game-log">
        <div style="display:flex; justify-content:space-between; margin-bottom:12px; color:#64748b; border-bottom:1px solid #334155; padding-bottom:8px;">
            <span style="font-size:0.65rem; font-weight: 900; letter-spacing: 1px;">CONSOLE</span>
            <button id="clrBtn" onclick="clearLog()" style="display:none; background:none; border:none; color:var(--primary-red); cursor:pointer; font-weight:900; font-size:0.6rem;">CLR</button>
        </div>
        <div id="gameLogEntries"></div>
    </div>
